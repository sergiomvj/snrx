server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;

    # Serve qualquer .html diretamente (demo, simulator, videoflow, videorobot...)
    location ~* \.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # Assets estáticos com cache longo
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|woff2|woff|ttf|css|js)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Fallback para SPA / index
    location / {
        try_files $uri $uri/ /index.html;
    }
}
